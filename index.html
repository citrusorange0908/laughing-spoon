<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Filter List</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>フィルター付きリスト</h1>

<div class="filters">
  <button onclick="filterItems('all')">すべて</button>
  <button onclick="filterItems('fruit')">果物</button>
  <button onclick="filterItems('vegetable')">野菜</button>
</div>

<ul id="itemList">

<li data-category="fruit">りんご</li>
<li data-category="fruit">バナナ</li>
<li data-category="vegetable">にんじん</li>
<li data-category="vegetable">じゃがいも</li>
<li data-category="fruit">オレンジ</li>

</ul>

<script src="script.js"></script>

</body>
</html>
